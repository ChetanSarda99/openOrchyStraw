<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrchyStraw</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      /* Initial bg via CSS var so theme toggle can flip it */
      html {
        background: var(--bg-init, #0a0a0a);
        color: var(--fg-init, #fafafa);
      }
      html.light {
        --bg-init: #ffffff;
        --fg-init: #0a0a0a;
      }
    </style>
    <script>
      // Apply theme as early as possible to avoid flash
      try {
        var t = localStorage.getItem('orch-theme');
        if (t === 'light') document.documentElement.classList.add('light');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
