# OrchyStraw Private — Self-Development Agent Team
# Dogfooding: OrchyStraw develops OrchyStraw
# 13 agents: CEO, CTO, PM, Tauri-Rust, Tauri-UI, Backend, iOS, Pixel, QA, Security, Web, Brand, HR
#
# Format: AGENT_ID | PROMPT_FILE | FILE_OWNERSHIP | CYCLE_INTERVAL | LABEL
# CYCLE_INTERVAL: 0=coordinator (runs LAST), 1=every cycle, 2=every other, 3=every 3rd, etc.
#
# ═══════════════════════════════════════════════════════════════════════════════
# MANDATORY AGENTS (every OrchyStraw project must have these 7 at minimum):
#   01-ceo    — Vision, strategy, market positioning
#   02-cto    — Architecture, tech decisions, standards
#   03-pm     — Coordination, task assignment, prompt management (runs LAST)
#   06-backend — Core orchestrator engine / primary codebase
#   09-qa     — Quality assurance (read-only reviewer)
#   11-web    — Landing page + docs site
#   12-brand  — Naming, brand identity, voice (RUNS FIRST on new projects)
#   13-hr     — Team composition, onboarding, agent health
# ═══════════════════════════════════════════════════════════════════════════════

# ── Strategic Layer (every 3rd cycle) ──
01-ceo      | prompts/01-ceo/01-ceo.txt              | prompts/01-ceo/ docs/strategy/         | 3 | CEO (Vision & Direction)

# ── Technical Leadership (every 2nd cycle) ──
02-cto      | prompts/02-cto/02-cto.txt              | prompts/02-cto/ docs/architecture/      | 2 | CTO (Architecture & Standards)

# ── Coordinator (runs LAST — after all workers) ──
03-pm       | prompts/03-pm/03-pm.txt                | prompts/ docs/                          | 0 | PM Coordinator

# ── Tauri Desktop App (every cycle) ──
04-tauri-rust | prompts/04-tauri-rust/04-tauri-rust.txt | src-tauri/src/ src-tauri/Cargo.toml    | 1 | Tauri Rust Backend (commands, state, IPC)
05-tauri-ui   | prompts/05-tauri-ui/05-tauri-ui.txt     | src/ public/ index.html src/styles/    | 1 | Tauri React Frontend (UI + pages)

# ── Core Engine (every cycle) ──
06-backend  | prompts/06-backend/06-backend.txt       | scripts/ src/core/ src/lib/              | 1 | Backend (Orchestrator & Scripts)

# ── Mobile (every cycle) ──
07-ios      | prompts/07-ios/07-ios.txt               | ios/ src/native/                         | 1 | iOS Developer

# ── Pixel Agents Visualization (every 2nd cycle) ──
08-pixel    | prompts/08-pixel/08-pixel.txt           | src/pixel/ pixel-agents/                 | 2 | Pixel Agents (Visualization Layer)

# ── Quality & Security (every 3rd cycle) ──
09-qa       | prompts/09-qa/09-qa.txt                 | prompts/09-qa/reports/ tests/            | 3 | QA Engineer
10-security | prompts/10-security/10-security.txt     | prompts/10-security/reports/             | 3 | Security Auditor (read-only)

# ── Web Presence (every 2nd cycle) ──
11-web      | prompts/11-web/11-web.txt               | site/                                    | 2 | Web Developer (Landing Page & Docs)

# ── Brand & Naming (every 3rd cycle, FIRST PRIORITY on new projects) ──
12-brand    | prompts/12-brand/12-brand.txt           | prompts/12-brand/ docs/brand/            | 3 | Brand & Naming Strategist

# ── HR & Team Health (every 3rd cycle) ──
13-hr       | prompts/13-hr/13-hr.txt                 | prompts/13-hr/ docs/team/                | 3 | HR & Team Culture
