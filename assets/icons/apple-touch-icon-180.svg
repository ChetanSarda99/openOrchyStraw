<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <title>OrchyStraw apple-touch-icon 180</title>
  <!-- iOS will apply its own mask, but we fill the full area with the brand background -->
  <rect width="180" height="180" fill="#0a0a0a"/>
  <g transform="translate(34,30)">
    <polygon points="56,8 100,34 100,78 56,104 12,78 12,34"
             fill="#3b82f6" fill-opacity="0.12"
             stroke="#3b82f6" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="56,34 100,60 100,104 56,130 12,104 12,60"
             fill="#3b82f6" fill-opacity="0.12"
             stroke="#3b82f6" stroke-width="4" stroke-linejoin="round"/>
    <g stroke="#3b82f6" stroke-width="2.4" stroke-linecap="round" opacity="0.55">
      <line x1="56" y1="69" x2="56" y2="34"/>
      <line x1="56" y1="69" x2="12" y2="69"/>
      <line x1="56" y1="69" x2="100" y2="69"/>
      <line x1="56" y1="69" x2="56" y2="104"/>
    </g>
    <circle cx="56" cy="69" r="6.5" fill="#3b82f6"/>
  </g>
  <text x="90" y="164" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700"
        fill="#fafafa" letter-spacing="0.5">orchystraw</text>
</svg>
