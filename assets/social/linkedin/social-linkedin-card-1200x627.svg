<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <title>OrchyStraw LinkedIn link preview card</title>
  <desc>Brand-accurate 1200x627 link preview for LinkedIn article/link shares.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0.2" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#leftGlow)"/>

  <!-- Faint grid -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="627"/>
    <line x1="120" y1="0" x2="120" y2="627"/>
    <line x1="180" y1="0" x2="180" y2="627"/>
    <line x1="240" y1="0" x2="240" y2="627"/>
    <line x1="300" y1="0" x2="300" y2="627"/>
    <line x1="360" y1="0" x2="360" y2="627"/>
    <line x1="420" y1="0" x2="420" y2="627"/>
    <line x1="480" y1="0" x2="480" y2="627"/>
    <line x1="540" y1="0" x2="540" y2="627"/>
    <line x1="600" y1="0" x2="600" y2="627"/>
    <line x1="660" y1="0" x2="660" y2="627"/>
    <line x1="720" y1="0" x2="720" y2="627"/>
    <line x1="780" y1="0" x2="780" y2="627"/>
    <line x1="840" y1="0" x2="840" y2="627"/>
    <line x1="900" y1="0" x2="900" y2="627"/>
    <line x1="960" y1="0" x2="960" y2="627"/>
    <line x1="1020" y1="0" x2="1020" y2="627"/>
    <line x1="1080" y1="0" x2="1080" y2="627"/>
    <line x1="1140" y1="0" x2="1140" y2="627"/>
  </g>

  <!-- Decorative hexagon cluster (right side) -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.08">
    <polygon points="880,80 920,103 920,149 880,172 840,149 840,103"/>
    <polygon points="940,120 980,143 980,189 940,212 900,189 900,143"/>
    <polygon points="1000,80 1040,103 1040,149 1000,172 960,149 960,103"/>
    <polygon points="1060,120 1100,143 1100,189 1060,212 1020,189 1020,143"/>
    <polygon points="880,200 920,223 920,269 880,292 840,269 840,223"/>
    <polygon points="940,240 980,263 980,309 940,332 900,309 900,263"/>
    <polygon points="1000,200 1040,223 1040,269 1000,292 960,269 960,223"/>
    <polygon points="1060,240 1100,263 1100,309 1060,332 1020,309 1020,263"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(100, 175) scale(1.4)">
    <polygon points="40,6 62,19 62,44 40,57 18,44 18,19"
             fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,30 62,43 62,68 40,81 18,68 18,43"
             fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <g stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
      <line x1="40" y1="44" x2="40" y2="30"/>
      <line x1="40" y1="44" x2="18" y2="44"/>
      <line x1="40" y1="44" x2="62" y2="44"/>
      <line x1="40" y1="44" x2="40" y2="57"/>
    </g>
    <circle cx="40" cy="44" r="4" fill="#3b82f6"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="275" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="62" font-weight="700" fill="#fafafa" letter-spacing="-2">orchystraw</text>

  <!-- Tagline -->
  <text x="100" y="345" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="26" fill="#94a3b8">Multi-agent AI orchestration for developers</text>

  <!-- Hook copy -->
  <text x="100" y="398" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="#fafafa" opacity="0.85">Coordinate CEO, CTO, backend, QA, and security agents from one script.</text>

  <!-- Agent count badge -->
  <g transform="translate(100, 440)">
    <rect width="220" height="44" rx="22" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="26" cy="22" r="9" fill="#3b82f6" opacity="0.85"/>
    <text x="26" y="27" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a">12</text>
    <text x="48" y="28" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">agents orchestrated</text>
  </g>

  <!-- Feature pill -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="16">
    <rect x="336" y="440" width="220" height="44" rx="22" fill="#3b82f6" opacity="0.1"/>
    <text x="446" y="468" text-anchor="middle" fill="#3b82f6">MIT · open source</text>
  </g>

  <!-- GitHub URL -->
  <text x="100" y="555" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="18" fill="#ffffff" opacity="0.3">github.com/ChetanSarda99/openOrchyStraw</text>

  <!-- Bottom accent line -->
  <rect x="0" y="619" width="1200" height="8" fill="#3b82f6" opacity="0.4"/>
</svg>
