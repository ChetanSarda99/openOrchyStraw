<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <title>OrchyStraw Twitter/X link preview card</title>
  <desc>Brand-accurate 1200x675 link preview for Twitter/X summary_large_image cards.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0.2" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#leftGlow)"/>

  <!-- Decorative hexagon cluster (right side) -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.08">
    <polygon points="880,90 920,113 920,159 880,182 840,159 840,113"/>
    <polygon points="940,130 980,153 980,199 940,222 900,199 900,153"/>
    <polygon points="1000,90 1040,113 1040,159 1000,182 960,159 960,113"/>
    <polygon points="1060,130 1100,153 1100,199 1060,222 1020,199 1020,153"/>
    <polygon points="880,210 920,233 920,279 880,302 840,279 840,233"/>
    <polygon points="940,250 980,273 980,319 940,342 900,319 900,273"/>
    <polygon points="1000,210 1040,233 1040,279 1000,302 960,279 960,233"/>
    <polygon points="1060,250 1100,273 1100,319 1060,342 1020,319 1020,273"/>
    <polygon points="880,330 920,353 920,399 880,422 840,399 840,353"/>
    <polygon points="940,370 980,393 980,439 940,462 900,439 900,393"/>
    <polygon points="1000,330 1040,353 1040,399 1000,422 960,399 960,353"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(100, 190) scale(1.4)">
    <polygon points="40,6 62,19 62,44 40,57 18,44 18,19"
             fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,30 62,43 62,68 40,81 18,68 18,43"
             fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <g stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
      <line x1="40" y1="44" x2="40" y2="30"/>
      <line x1="40" y1="44" x2="18" y2="44"/>
      <line x1="40" y1="44" x2="62" y2="44"/>
      <line x1="40" y1="44" x2="40" y2="57"/>
    </g>
    <circle cx="40" cy="44" r="4" fill="#3b82f6"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="290" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="66" font-weight="700" fill="#fafafa" letter-spacing="-2">orchystraw</text>

  <!-- Tagline -->
  <text x="100" y="360" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="28" fill="#94a3b8">Multi-agent AI orchestration</text>

  <!-- Hook copy -->
  <text x="100" y="418" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" fill="#fafafa" opacity="0.85">12 agents. Zero dependencies. One bash script.</text>

  <!-- Feature pills -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="16">
    <rect x="100" y="450" width="180" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="190" y="473" text-anchor="middle" fill="#3b82f6">Markdown-first</text>

    <rect x="300" y="450" width="200" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="400" y="473" text-anchor="middle" fill="#3b82f6">Zero dependencies</text>

    <rect x="520" y="450" width="150" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="595" y="473" text-anchor="middle" fill="#3b82f6">Bash + AI</text>
  </g>

  <!-- GitHub URL -->
  <text x="100" y="560" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="18" fill="#ffffff" opacity="0.3">github.com/ChetanSarda99/openOrchyStraw</text>

  <!-- Bottom accent line -->
  <rect x="0" y="667" width="1200" height="8" fill="#3b82f6" opacity="0.4"/>
</svg>
