<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Decorative hexagon pattern (echoing logo) -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.06">
    <polygon points="900,60 940,83 940,129 900,152 860,129 860,83"/>
    <polygon points="960,100 1000,123 1000,169 960,192 920,169 920,123"/>
    <polygon points="1020,60 1060,83 1060,129 1020,152 980,129 980,83"/>
    <polygon points="1080,100 1120,123 1120,169 1080,192 1040,169 1040,123"/>
    <polygon points="900,180 940,203 940,249 900,272 860,249 860,203"/>
    <polygon points="1140,60 1180,83 1180,129 1140,152 1100,129 1100,83"/>
  </g>
  <!-- Logo mark (overlapping hexagons) -->
  <g transform="translate(100, 180) scale(1.2)">
    <polygon points="40,6 62,19 62,44 40,57 18,44 18,19" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,30 62,43 62,68 40,81 18,68 18,43" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="40" cy="44" r="4" fill="#3b82f6"/>
  </g>
  <!-- Title -->
  <text x="220" y="260" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-2">orchystraw</text>
  <!-- Tagline -->
  <text x="100" y="330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#e2e8f0" opacity="0.6">Multi-agent AI orchestration</text>
  <!-- Feature pills -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="18">
    <rect x="100" y="370" width="180" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="190" y="394" text-anchor="middle" fill="#3b82f6">Markdown-first</text>
    <rect x="300" y="370" width="200" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="400" y="394" text-anchor="middle" fill="#3b82f6">Zero dependencies</text>
    <rect x="520" y="370" width="150" height="36" rx="18" fill="#3b82f6" opacity="0.1"/>
    <text x="595" y="394" text-anchor="middle" fill="#3b82f6">Bash + AI</text>
  </g>
  <!-- Agent count badge -->
  <g transform="translate(100, 440)">
    <rect width="240" height="48" rx="24" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="28" cy="24" r="10" fill="#3b82f6" opacity="0.8"/>
    <text x="28" y="29" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">12</text>
    <text x="52" y="30" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#94a3b8">agents orchestrated</text>
  </g>
  <!-- GitHub URL -->
  <text x="100" y="560" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="18" fill="#ffffff" opacity="0.25">github.com/ChetanSarda99/openOrchyStraw</text>
  <!-- Bottom accent line -->
  <rect x="0" y="632" width="1280" height="8" fill="#3b82f6" opacity="0.4"/>
</svg>
