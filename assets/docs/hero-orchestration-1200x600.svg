<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <title>OrchyStraw docs hero — multi-agent orchestration network</title>
  <desc>A central orchestrator hexagon connected to twelve agent nodes arranged in a halo, representing OrchyStraw's multi-agent coordination model. Brand-accurate dark mode.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="agentGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Faint grid (4% opacity, 60px cells) -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="600"/>
    <line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="180" y1="0" x2="180" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="420" y1="0" x2="420" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="540" y1="0" x2="540" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="660" y1="0" x2="660" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
    <line x1="780" y1="0" x2="780" y2="600"/>
    <line x1="840" y1="0" x2="840" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
    <line x1="960" y1="0" x2="960" y2="600"/>
    <line x1="1020" y1="0" x2="1020" y2="600"/>
    <line x1="1080" y1="0" x2="1080" y2="600"/>
    <line x1="1140" y1="0" x2="1140" y2="600"/>
  </g>

  <!-- Orbit ring (subtle) -->
  <circle cx="600" cy="300" r="220" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="300" r="140" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.4" stroke-dasharray="3 5"/>

  <!-- Core glow halo -->
  <circle cx="600" cy="300" r="200" fill="url(#coreGlow)"/>

  <!-- Connection lines from core to 12 agent nodes -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.35" stroke-linecap="round">
    <!-- 12 positions around a radius=220 circle, starting at top -->
    <line x1="600" y1="300" x2="600" y2="80"/>
    <line x1="600" y1="300" x2="710" y2="110"/>
    <line x1="600" y1="300" x2="790" y2="190"/>
    <line x1="600" y1="300" x2="820" y2="300"/>
    <line x1="600" y1="300" x2="790" y2="410"/>
    <line x1="600" y1="300" x2="710" y2="490"/>
    <line x1="600" y1="300" x2="600" y2="520"/>
    <line x1="600" y1="300" x2="490" y2="490"/>
    <line x1="600" y1="300" x2="410" y2="410"/>
    <line x1="600" y1="300" x2="380" y2="300"/>
    <line x1="600" y1="300" x2="410" y2="190"/>
    <line x1="600" y1="300" x2="490" y2="110"/>
  </g>

  <!-- 12 agent nodes (hexagons) around the halo -->
  <g>
    <!-- Agent node template: hexagon width 48, height 55, centered at cx,cy -->
    <!-- Node positions mirror the line endpoints above -->
    <g transform="translate(600,80)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(710,110)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(790,190)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(820,300)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(790,410)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(710,490)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(600,520)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(490,490)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(410,410)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(380,300)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(410,190)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
    <g transform="translate(490,110)"><circle r="30" fill="url(#agentGlow)"/><polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/><circle r="4" fill="#3b82f6"/></g>
  </g>

  <!-- Core orchestrator: the brand mark at 2.2x scale -->
  <g transform="translate(600,300)">
    <!-- Back hexagon -->
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29"
             fill="#3b82f6" fill-opacity="0.15"
             stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>
    <!-- Front hexagon (offset down) -->
    <polygon points="0,-34 50,-5 50,53 0,82 -50,53 -50,-5"
             fill="#3b82f6" fill-opacity="0.15"
             stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner connection lines -->
    <g stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="0" y1="10" x2="0" y2="-34"/>
      <line x1="0" y1="10" x2="-50" y2="10"/>
      <line x1="0" y1="10" x2="50" y2="10"/>
      <line x1="0" y1="10" x2="0" y2="53"/>
    </g>
    <!-- Center node -->
    <circle cx="0" cy="10" r="7" fill="#3b82f6"/>
    <circle cx="0" cy="10" r="11" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- Corner label -->
  <text x="48" y="48" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="14" fill="#94a3b8" letter-spacing="1">ORCHYSTRAW</text>
  <text x="48" y="70" font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="11" fill="#3b82f6" opacity="0.7">// multi-agent orchestration</text>

  <!-- Bottom-right caption -->
  <text x="1152" y="560" text-anchor="end"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#94a3b8" opacity="0.7">12 agents · 1 orchestrator · 0 dependencies</text>
</svg>
