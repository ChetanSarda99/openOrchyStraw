# Sample Agent Configuration — Full Team
# Format: AGENT_ID | PROMPT_FILE | FILE_OWNERSHIP | CYCLE_INTERVAL | LABEL
# CYCLE_INTERVAL: 0=coordinator (runs LAST), 1=every cycle, 2=every other, 3=every 3rd
#
# ═══════════════════════════════════════════════════════════════════════════════
# MANDATORY AGENTS (every project needs these 7 minimum):
#   01-ceo    — Vision, strategy, positioning
#   02-cto    — Architecture, tech decisions, standards
#   03-pm     — Coordination, prompts (runs LAST)
#   XX-brand  — Naming + brand identity (FIRST PRIORITY on new projects)
#   XX-web    — Landing page + docs site
#   XX-qa     — Quality assurance (read-only)
#   XX-hr     — Team composition, onboarding, health
# ═══════════════════════════════════════════════════════════════════════════════

# ── Strategic Layer ──
01-ceo      | prompts/01-ceo/01-ceo.txt              | prompts/01-ceo/ docs/strategy/    | 3 | CEO (Vision & Direction)
02-cto      | prompts/02-cto/02-cto.txt              | prompts/02-cto/ docs/architecture/ docs/references/ | 2 | CTO (Architecture & Standards)

# ── Coordinator (runs LAST — after all workers) ──
03-pm       | prompts/03-pm/03-pm.txt                | prompts/ docs/                     | 0 | PM Coordinator

# ── Worker Agents (customize for your project) ──
04-backend  | prompts/04-backend/04-backend.txt      | backend/ prisma/ src/api/           | 1 | Backend Developer
05-frontend | prompts/05-frontend/05-frontend.txt    | frontend/ src/ui/ src/components/   | 1 | Frontend Developer

# ── Web Presence ──
06-web      | prompts/06-web/06-web.txt              | site/                               | 2 | Web Developer (Landing + Docs)

# ── Brand & Naming (FIRST PRIORITY on new projects) ──
07-brand    | prompts/07-brand/07-brand.txt          | prompts/07-brand/ docs/brand/       | 3 | Brand & Naming Strategist

# ── Quality & Security ──
08-qa       | prompts/08-qa/08-qa.txt                | prompts/08-qa/reports/ tests/       | 3 | QA Engineer (read-only reviewer)
09-security | prompts/09-security/09-security.txt    | prompts/09-security/reports/        | 3 | Security Auditor (read-only)

# ── HR & Team Culture ──
10-hr       | prompts/10-hr/10-hr.txt                | prompts/10-hr/ docs/team/           | 3 | HR & Team Culture

# ── Optional Agents ──
# 11-design  | prompts/11-design/11-design.txt      | src/styles/ src/components/ui/      | 2 | Design System
# 12-devops  | prompts/12-devops/12-devops.txt      | .github/ docker/ Dockerfile         | 5 | DevOps
# 13-mobile  | prompts/13-mobile/13-mobile.txt      | ios/ android/                       | 1 | Mobile Developer
# 14-docs    | prompts/14-docs/14-docs.txt          | docs/ README.md                     | 5 | Documentation
