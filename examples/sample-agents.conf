# Sample Agent Configuration
# Format: AGENT_ID | PROMPT_FILE | FILE_OWNERSHIP | CYCLE_INTERVAL | LABEL
# CYCLE_INTERVAL: run every Nth cycle (1=every cycle, 2=every other, etc.)
#
# Lines starting with # are comments. Blank lines ignored.
# 01-pm always runs LAST as coordinator — configured separately below.

# ── Coordinator Agent (runs LAST — after all workers) ──
01-pm      | prompts/01-pm/01-project-manager.txt  | prompts/ docs/ | 0 | PM Coordinator

# ── Worker Agents (run in parallel) ──
02-backend | prompts/02-backend/02-backend-dev.txt | backend/ prisma/ | 1 | Backend Developer
03-ios     | prompts/03-ios/03-ios-dev.txt         | ios/ !ios/App/Views/Components/ !ios/App/Utilities/Theme.swift | 1 | iOS Developer
04-design  | prompts/04-design/04-design-system.txt | ios/App/Views/Components/ ios/App/Utilities/Theme.swift | 1 | Design Architect
05-qa      | prompts/05-qa/05-qa-review.txt         | prompts/05-qa/reports/ backend/ ios/ docs/ | 5 | QA Engineer

# ── Adding New Agents ──
# To add a new agent:
# 1. Create prompts/<id>/<id>-<name>.txt
# 2. Add a line here with file ownership boundaries
# 3. The orchestrator picks it up automatically
#
# Examples of future agents:
# 06-test   | prompts/06-test/06-test-runner.txt    | backend/src/__tests__/ | 3 | Test Runner
# 07-docs   | prompts/07-docs/07-docs-writer.txt    | docs/ | 5 | Documentation
# 08-devops | prompts/08-devops/08-devops.txt        | .github/ docker-compose.yml | 5 | DevOps
