02-cto      | prompts/02-cto/02-cto.txt              | prompts/02-cto/ docs/architecture/      | 2 | CTO (Architecture & Standards)

# ── Coordinator (runs LAST — after all workers) ──
03-pm       | prompts/03-pm/03-pm.txt                | prompts/ docs/                          | 0 | PM Coordinator

# ── Tauri Desktop App (every cycle) ──
04-tauri-rust | prompts/04-tauri-rust/04-tauri-rust.txt | src-tauri/src/ src-tauri/Cargo.toml    | 1 | Tauri Rust Backend (commands, state, IPC)
05-tauri-ui   | prompts/05-tauri-ui/05-tauri-ui.txt     | src/ public/ index.html src/styles/    | 1 | Tauri React Frontend (UI + pages)

# ── Core Engine (every cycle) ──
