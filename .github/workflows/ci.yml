name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Shell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash version
        run: bash --version

      - name: Syntax-check all .sh files
        run: |
          errors=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>/tmp/lint-err; then
              echo "::error file=$f::Syntax error in $f"
              cat /tmp/lint-err
              errors=$((errors + 1))
            fi
          done < <(find bin/ scripts/ src/core/ -name '*.sh' -type f 2>/dev/null)

          # Also check bin/orchystraw (no .sh extension)
          if [[ -f bin/orchystraw ]]; then
            if ! bash -n bin/orchystraw 2>/tmp/lint-err; then
              echo "::error file=bin/orchystraw::Syntax error in bin/orchystraw"
              cat /tmp/lint-err
              errors=$((errors + 1))
            fi
          fi

          if [[ $errors -gt 0 ]]; then
            echo "Found $errors file(s) with syntax errors"
            exit 1
          fi
          echo "All shell files pass syntax check"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check bash version
        run: bash --version

      - name: Run test suite
        run: bash tests/core/run-tests.sh

  env-check:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run orchystraw doctor
        run: |
          chmod +x bin/orchystraw
          # doctor may fail in CI due to missing optional tools — allow soft failure
          bash bin/orchystraw doctor || echo "::warning::orchystraw doctor reported issues (expected in CI)"
