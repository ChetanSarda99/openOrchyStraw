<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Stylized orchestration symbol: two overlapping hexagons with center node -->
  <!-- Back hexagon -->
  <polygon points="16,2 28,9 28,22 16,29 4,22 4,9"
           fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Front hexagon (offset down) -->
  <polygon points="16,10 28,17 28,30 16,37 4,30 4,17"
           fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"
           transform="translate(0,-5)"/>
  <!-- Center node -->
  <circle cx="16" cy="16" r="3" fill="#3b82f6"/>
</svg>
